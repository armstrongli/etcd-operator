# etcd pod with both peer and client TLS
apiVersion: v1
kind: Pod
metadata:
  name: test-etcd-0
  labels:
    app: etcd
    etcd_node: test-etcd-0
    etcd_cluster: test-etcd
  annotations:
    etcd.version: "3.3.10"
spec:
  hostname: test-etcd-0
  subdomain: test-etcd
  automountServiceAccountToken: false
  restartPolicy: Never
  initContainers:
  - name: check-dns
    image: busybox:1.28.0-glibc
    command:
    - /bin/sh
    - -c
    - |
      TIMEOUT_READY=30
      while ( ! nslookup test-etcd-0.test-etcd.default.svc )
      do
        # If TIMEOUT_READY is 0 we should never time out and exit 
        TIMEOUT_READY=$(( TIMEOUT_READY-1 ))
        if [ $TIMEOUT_READY -eq 0 ];
        then
          echo "Timed out waiting for DNS entry"
          exit 1
        fi
        sleep 1
      done
  containers:
  - name: etcd
    image: quay.io/coreos/etcd:v3.3.10
    command:
    - /usr/local/bin/etcd
    - --data-dir=/var/etcd/data
    - --name=test-etcd-0
    - --initial-advertise-peer-urls=https://test-etcd-0.test-etcd.default.svc:2380
    - --listen-peer-urls=https://0.0.0.0:2380
    - --listen-client-urls=https://0.0.0.0:2379
    - --advertise-client-urls=https://test-etcd-0.test-etcd.default.svc:2379
    - --initial-cluster=test-etcd-0=https://test-etcd-0.test-etcd.default.svc:2380
    - --initial-cluster-state=new
    - --peer-client-cert-auth=true
    - --peer-trusted-ca-file=/etc/etcdtls/member/peer-tls/peer-ca.crt
    - --peer-cert-file=/etc/etcdtls/member/peer-tls/peer.crt
    - --peer-key-file=/etc/etcdtls/member/peer-tls/peer.key
    - --client-cert-auth=true
    - --trusted-ca-file=/etc/etcdtls/member/server-tls/server-ca.crt
    - --cert-file=/etc/etcdtls/member/server-tls/server.crt
    - --key-file=/etc/etcdtls/member/server-tls/server.key
    - --initial-cluster-token=test-token
    volumeMounts:
    - mountPath: /var/etcd
      name: etcd-data
    - mountPath: /etc/etcdtls/member/peer-tls
      name: member-peer-tls
    - mountPath: /etc/etcdtls/member/server-tls
      name: member-server-tls
    - mountPath: /etc/etcdtls/operator/etcd-tls
      name: etcd-client-tls
    ports:
    - name: server
      containerPort: 2380
      protocol: TCP
    - name: client
      containerPort: 2379
      protocol: TCP
    livenessProbe:
      exec:
        command:
        - etcdctl
        - --endpoints=https://localhost:2379
        - --cert=/etc/etcdtls/operator/etcd-tls/etcd-client.crt
        - --key=/etc/etcdtls/operator/etcd-tls/etcd-client.key
        - --cacert=/etc/etcdtls/operator/etcd-tls/etcd-client-ca.crt
        - endpoint
        - status
      initialDelaySeconds: 10
      periodSeconds: 60
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      exec:
        command:
        - etcdctl
        - --endpoints=https://localhost:2379
        - --cert=/etc/etcdtls/operator/etcd-tls/etcd-client.crt
        - --key=/etc/etcdtls/operator/etcd-tls/etcd-client.key
        - --cacert=/etc/etcdtls/operator/etcd-tls/etcd-client-ca.crt
        - endpoint
        - status
      initialDelaySeconds: 1
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 3
  volumes:
  - name: member-peer-tls
    secret:
      secretName: peer-secret
  - name: member-server-tls
    secret:
      secretName: server-secret
  - name: etcd-client-tls
    secret:
      secretName: operator-secret
