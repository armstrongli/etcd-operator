apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-operator
rules:
- apiGroups:
  - "apiextensions.k8s.io"
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
- apiGroups:
  - "apiextensions.k8s.io"
  resources:
  - customresourcedefinitions
  resourceNames:
  - etcdclusters.etcd.database.coreos.com
  - etcdbackups.etcd.database.coreos.com
  - etcdrestores.etcd.database.coreos.com
  verbs:
  - update
  - patch
  - delete
